<!-- index.html -->

<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Panic Attack 04</title>

  <!-- FONTS -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <!-- GRID BACKGROUND -->
  <div class="grid-bg"></div>

  <!-- FLOATING CODE SYMBOLS -->
  <div class="floating-tech">

    <span>{ }</span>
    <span>&lt;/&gt;</span>
    <span>C#</span>
    <span>.NET</span>
    <span>SQL</span>
    <span>ASP</span>
    <span>LINQ</span>
    <span>API</span>

  </div>

  <!-- MAIN CONTAINER -->
  <div class="container">

    <!-- TOP BAR -->
    <div class="top-bar">

      <div class="status-dot"></div>

      <p>COMPUTER LABORATORY 2-II</p>

    </div>

    <!-- TERMINAL -->
    <div class="terminal">

      <div class="terminal-header">

        <span class="red"></span>
        <span class="yellow"></span>
        <span class="green"></span>

      </div>

      <div class="terminal-content">

        <h1>PANIC ATTACK 04</h1>

        <h2>PRACTICAL QUIZ</h2>

        <div class="timer-box">

          <p>SYSTEM COUNTDOWN</p>

          <div id="timer">01:05:00</div>

        </div>

        <div class="buttons">

          <a href="Lab Sheet 04.pdf"
             download
             class="btn download-btn">

            Download Quiz

          </a>

          <a href="https://www.dropbox.com/"
             target="_blank"
             class="btn submit-btn"
             id="submitBtn">

            Submit Solution

          </a>

        </div>

        <div id="timeUpMessage" class="time-up-message">

          ⚠ SYSTEM LOCKED — TIME IS UP

        </div>

      </div>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
